name: ReDDone CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm prisma:generate
      - run: pnpm exec prisma validate
      - run: pnpm typecheck
      - run: pnpm --dir backend install --frozen-lockfile --ignore-scripts
      - run: pnpm --dir backend prisma:generate
      - run: pnpm --dir backend typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
        env:
          DEMO_MODE: "true"
          NEXT_PUBLIC_APP_URL: http://localhost:3000
