packages:
  - "."

allowBuilds:
  '@prisma/engines': true
  '@swc/core': true
  cbor-extract: true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@aws-sdk/client-kms@3.1085.0'
  - '@aws-sdk/client-s3@3.1085.0'
  - '@aws-sdk/credential-providers@3.1085.0'
  - '@aws-sdk/s3-request-presigner@3.1085.0'
  - '@daytona/api-client@0.196.0'
  - '@daytona/sdk@0.196.0'
  - '@daytona/toolbox-api-client@0.196.0'

onlyBuiltDependencies:
  - "@prisma/engines"
  - "prisma"
  - "sharp"

overrides:
  path-to-regexp: ">=8.4.0"
  tar: ">=7.5.8"
  minimatch: ">=10.2.3"
  undici: ">=6.20.0"
  postcss: ">=8.4.47"
  uuid: ">=9.0.2"
  js-yaml: ">=4.1.2"
  ajv: ">=8.16.0"
  '@hono/node-server': ">=1.19.13"
  fast-xml-parser: ">=5.7.0"
  smol-toml: ">=1.6.1"
  esbuild: ">=0.28.1"
  '@tootallnate/once': ">=2.0.1"
