services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: reddone
      POSTGRES_USER: reddone
      POSTGRES_PASSWORD: reddone
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reddone"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - reddone-postgres:/var/lib/postgresql/data

volumes:
  reddone-postgres:
